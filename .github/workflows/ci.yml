name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # paths-filter reads PR file changes via the REST API in fork-PR scenarios;
  # pull-requests:read is the documented minimum for it to function.
  pull-requests: read

# Cancel in-progress PR runs when a new push lands on the same PR. For pushes
# to main, each commit gets its own group (keyed on sha) so back-to-back
# merges never cancel each other — important once future jobs publish
# artifacts or trigger deploy steps.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      grader: ${{ steps.filter.outputs.grader }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            engine:
              - 'engine/**'
              - 'proto/**'
              # Built-in task library and baseline data are part of the engine's
              # runtime image (see docker/engine/Dockerfile).
              - 'tasks/**'
              - 'baselines/**'
            grader:
              - 'grader/**'
              - 'proto/**'
            frontend:
              - 'frontend/**'
            ci:
              - '.github/workflows/**'
              - 'Makefile'
              - 'docs/ci.md'
              # Container build changes can affect any service's runtime.
              - 'docker/**'
              - 'docker-compose.yml'

  engine:
    name: Engine (Go)
    needs: changes
    # Always run on main pushes. On PRs, run only when engine code, shared
    # proto, or CI itself changed — the ci filter is the safety net that
    # forces a full sweep whenever the pipeline definition changes.
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.engine == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: go test (integration)
        run: go test -race -count=1 -tags=integration ./test/integration/...

  grader:
    name: Grader (Python)
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.grader == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: grader
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-path: grader/uv.lock

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: Frontend (TypeScript)
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Design-token sweep
        run: npm run check:tokens

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  # Sentinel: a single required check that branch protection can pin to.
  # Without this, a failure inside the `changes` job would cascade as
  # "skipped" status on engine/grader/frontend, which branch-protection
  # rules can interpret as success. ci-gate fails closed: it only succeeds
  # when every dependent job either succeeded or was legitimately skipped
  # by the path filter (i.e., changes itself succeeded).
  ci-gate:
    name: CI gate
    needs: [changes, engine, grader, frontend]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check results
        run: |
          changes_result="${{ needs.changes.result }}"
          engine_result="${{ needs.engine.result }}"
          grader_result="${{ needs.grader.result }}"
          frontend_result="${{ needs.frontend.result }}"

          echo "changes=$changes_result, engine=$engine_result, grader=$grader_result, frontend=$frontend_result"

          # changes must succeed — a skipped or failed changes job means we
          # cannot trust the path filter and must fail closed.
          if [ "$changes_result" != "success" ]; then
            echo "❌ changes job did not succeed; failing the gate to be safe"
            exit 1
          fi

          # Service jobs may legitimately be "skipped" because the path
          # filter excluded them. "success" and "skipped" are both pass;
          # anything else (failure, cancelled) fails the gate.
          for name in engine grader frontend; do
            result_var="${name}_result"
            result="${!result_var}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "❌ $name reported $result; failing the gate"
              exit 1
            fi
          done

          echo "✅ all dependent jobs ok"
