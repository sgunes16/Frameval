name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel in-progress PR runs when a new push lands on the same PR. For pushes
# to main, each commit gets its own group (keyed on sha) so back-to-back
# merges never cancel each other — important once future jobs publish
# artifacts or trigger deploy steps.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  engine:
    name: Engine (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: go test (integration)
        run: go test -race -count=1 -tags=integration ./test/integration/...

  grader:
    name: Grader (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: grader
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-path: grader/uv.lock

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: ruff check
        # Non-blocking until issue #88 lands the F401 cleanup. `continue-on-error`
        # makes the failed step visible in the job summary instead of hiding it
        # behind `|| true`. Drop this once #88 merges.
        continue-on-error: true
        run: uv run ruff check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
