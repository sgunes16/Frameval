name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  # paths-filter reads PR file changes via the REST API in fork-PR scenarios;
  # pull-requests:read is the documented minimum for it to function.
  pull-requests: read

# Cancel in-progress PR runs when a new push lands on the same PR. For pushes
# to main, each commit gets its own group (keyed on sha) so back-to-back
# merges never cancel each other — important once future jobs publish
# artifacts or trigger deploy steps.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      grader: ${{ steps.filter.outputs.grader }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            engine:
              - 'engine/**'
              - 'proto/**'
            grader:
              - 'grader/**'
              - 'proto/**'
            frontend:
              - 'frontend/**'
            ci:
              - '.github/workflows/**'
              - 'Makefile'
              - 'docs/ci.md'

  engine:
    name: Engine (Go)
    needs: changes
    # Always run on main pushes. On PRs, run only when engine code, shared
    # proto, or CI itself changed — the ci filter is the safety net that
    # forces a full sweep whenever the pipeline definition changes.
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.engine == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: engine/go.mod
          cache-dependency-path: engine/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race -count=1 ./...

      - name: go test (integration)
        run: go test -race -count=1 -tags=integration ./test/integration/...

  grader:
    name: Grader (Python)
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.grader == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: grader
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-path: grader/uv.lock

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: pytest
        run: uv run pytest

  frontend:
    name: Frontend (TypeScript)
    needs: changes
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
